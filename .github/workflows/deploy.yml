name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: saiaditya10/k8s-monitor-backend:latest
          

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: saiaditya10/k8s-monitor-frontend:latest


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            kubectl rollout restart deployment backend -n k8s-monitor
            kubectl rollout restart deployment frontend -n k8s-monitor

            kubectl rollout status deployment/backend -n k8s-monitor
            kubectl rollout status deployment/frontend -n k8s-monitor