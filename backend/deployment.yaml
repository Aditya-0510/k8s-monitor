apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: k8s-monitor

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      serviceAccountName: k8s-monitor-backend
      
      containers:
        - name: backend

          image: saiaditya10/k8s-monitor-backend:latest

          ports:
            - containerPort: 8080